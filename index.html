<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pajarito Clicker - Retiro Real</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #1a1a1a, #000); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        #score-container { margin-top: 40px; text-align: center; }
        #score { font-size: 3rem; font-weight: bold; color: #00d4ff; text-shadow: 0 0 20px rgba(0,212,255,0.5); }
        
        /* El Pajarito / Botón de Click */
        #game-bird { width: 200px; height: 200px; background: url('https://cdn-icons-png.flaticon.com/512/733/733579.png') no-repeat center; background-size: contain; margin: 50px 0; cursor: pointer; transition: transform 0.05s; user-select: none; }
        #game-bird:active { transform: scale(0.95); }

        /* Panel de Retiro Inferior */
        #withdrawal-panel { position: fixed; bottom: 0; width: 100%; max-width: 450px; background: #111; padding: 20px; border-radius: 20px 20px 0 0; border-top: 2px solid #333; text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #222; color: #fff; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #00d4ff; color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        #status-msg { font-size: 12px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

    <div id="score-container">
        <p>PUNTOS ACUMULADOS</p>
        <div id="score">0</div>
    </div>

    <div id="game-bird" onclick="clickBird()"></div>

    <div id="withdrawal-panel">
        <input type="text" id="wallet-addr" placeholder="Pega tu dirección UQBpc...">
        <button onclick="payout()">RETIRAR AHORA</button>
        <div id="status-msg">Toca el pájaro para sumar puntos</div>
    </div>

<script>
    let currentPoints = 0;
    const scoreElement = document.getElementById('score');
    const statusMsg = document.getElementById('status-msg');

    // Tu API KEY de Toncenter
    const MY_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";

    function clickBird() {
        currentPoints += 1;
        scoreElement.innerText = currentPoints;
        statusMsg.innerText = "¡Sumando puntos!";
        statusMsg.style.color = "#00d4ff";
    }

    async function payout() {
        const wallet = document.getElementById('wallet-addr').value;

        if (currentPoints < 10) {
            statusMsg.innerText = "❌ Necesitas al menos 10 puntos para retirar.";
            statusMsg.style.color = "#ff4444";
            return;
        }

        if (!wallet || wallet.length < 10) {
            statusMsg.innerText = "❌ Dirección de billetera inválida.";
            return;
        }

        statusMsg.innerText = "⏳ Intentando retiro vía Toncenter...";

        try {
            const response = await fetch("https://toncenter.com/api/v2/jsonRPC", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': MY_KEY
                },
                body: JSON.stringify({
                    "id": 1,
                    "jsonrpc": "2.0",
                    "method": "sendTransfer", 
                    "params": {
                        "dest": wallet,
                        "amount": currentPoints * 1000000, // Convertir a nanotons
                    }
                })
            });

            const data = await response.json();

            if (data.ok) {
                statusMsg.innerText = "✅ ¡DINERO ENVIADO! Revisa tu wallet.";
                currentPoints = 0;
                scoreElement.innerText = "0";
            } else {
                // Aquí es donde verás el error real de la red
                statusMsg.innerText = "❌ Error: " + (data.error || "Sin saldo en cuenta maestra");
                console.log("Detalle del error:", data);
            }
        } catch (e) {
            statusMsg.innerText = "❌ Error de conexión con Toncenter.";
        }
    }
</script>

</body>
</html>
