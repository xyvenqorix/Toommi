<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Retiro Real - Pajarito Game</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #111; padding: 30px; border-radius: 15px; width: 340px; border: 1px solid #00d4ff; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #000; color: #00d4ff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 5px; border: none; background: #00d4ff; color: #000; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 13px; color: #888; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#00d4ff">🦅 Retiro Real</h2>
    <p style="font-size: 12px;">Los puntos se enviarán a esta billetera:</p>
    
    <input type="number" id="puntos" placeholder="Cantidad de puntos">
    <input type="text" id="wallet" placeholder="Dirección UQBpc...">
    
    <button onclick="enviarPagoToncenter()">RETIRAR PUNTOS</button>
    
    <div id="status"></div>
</div>

<script>
    // Tu Key de Toncenter configurada
    const API_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";
    const TONCENTER_URL = "https://toncenter.com/api/v2/jsonRPC";

    async function enviarPagoToncenter() {
        const puntos = document.getElementById('puntos').value;
        const destino = document.getElementById('wallet').value;
        const status = document.getElementById('status');

        if (!puntos || !destino) {
            status.innerText = "❌ Escribe la cantidad y la dirección.";
            return;
        }

        status.innerText = "⏳ Procesando transacción en la red TON...";

        try {
            // Conversión: Aquí decides cuántos TON valen tus puntos (ej: 1000 pts = 0.1 TON)
            // 1 TON = 1,000,000,000 nanotons
            const montoNano = puntos * 100000000; 

            const response = await fetch(TONCENTER_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY // Usamos el header que pide Toncenter
                },
                body: JSON.stringify({
                    "id": 1,
                    "jsonrpc": "2.0",
                    "method": "sendTransfer", // Método para enviar desde tu wallet vinculada a la Key
                    "params": {
                        "dest": destino,
                        "amount": montoNano,
                        "message": "Retiro Pajarito Game"
                    }
                })
            });

            const data = await response.json();

            if (data.ok) {
                status.style.color = "#00ff88";
                status.innerText = "✅ ¡Enviado! Hash: " + data.result.hash;
            } else {
                // Aquí es donde te dirá "Insufficient balance" si tu wallet está vacía
                status.style.color = "#ff4444";
                status.innerText = "❌ Error: " + (data.error || "No se pudo procesar. Revisa tu balance.");
            }

        } catch (error) {
            status.innerText = "❌ Error de conexión. Prueba subiendo el código a Vercel.";
            console.error(error);
        }
    }
</script>

</body>
</html>
