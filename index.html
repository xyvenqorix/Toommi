<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xyvenqorix Miner</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 0 20px rgba(0,136,204,0.3); }
        .score { font-size: 3rem; font-weight: bold; color: #0088cc; margin: 20px 0; }
        .btn-mine { background: #0088cc; border: none; width: 150px; height: 150px; border-radius: 50%; color: white; font-weight: bold; cursor: pointer; font-size: 1.2rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.1s; }
        .btn-mine:active { transform: scale(0.9); }
        .withdraw-section { margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; }
        .btn-withdraw { background: #22c55e; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status { font-size: 0.8rem; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Xyvenqorix Miner ⛏️</h2>
    <div id="ton-connect-button" style="display: flex; justify-content: center; margin-bottom: 20px;"></div>
    
    <div class="score" id="balance">0</div>
    <p>Puntos acumulados</p>
    
    <button class="btn-mine" onclick="mine()">¡MINAR!</button>

    <div class="withdraw-section">
        <h3>Retirar a Tonkeeper</h3>
        <input type="text" id="wallet-addr" placeholder="Pega tu dirección UQBpc...">
        <button class="btn-withdraw" onclick="solicitarRetiro()">RETIRAR AHORA</button>
        <p id="status">Mínimo para retirar: 100 puntos</p>
    </div>
</div>

<script>
    let puntos = 0;
    const API_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";

    // Inicializar TonConnect
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react/master/public/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-button'
    });

    function mine() {
        puntos += 10;
        document.getElementById('balance').innerText = puntos;
        if(puntos >= 100) {
            document.getElementById('status').innerText = "✅ ¡Mínimo alcanzado! Puedes retirar.";
            document.getElementById('status').style.color = "#22c55e";
        }
    }

    async function solicitarRetiro() {
        const wallet = document.getElementById('wallet-addr').value;
        const status = document.getElementById('status');

        if (!tonConnectUI.connected) {
            alert("Primero conecta tu Tonkeeper arriba ⬆️");
            return;
        }

        if (puntos < 100) {
            alert("Necesitas al menos 100 puntos.");
            return;
        }

        if (wallet.length < 10) {
            alert("Por favor, pon una dirección de billetera válida.");
            return;
        }

        status.innerText = "⏳ Procesando con la API...";

        // Configuración de la transacción
        const transaction = {
            validUntil: Math.floor(Date.now() / 1000) + 120,
            messages: [
                {
                    address: wallet, // La billetera que el usuario escribió
                    amount: "10000000", // 0.01 TON para la prueba
                    payload: "" // Opcional: comentario
                }
            ]
        };

        try {
            const result = await tonConnectUI.sendTransaction(transaction);
            status.innerText = "🚀 ¡Retiro enviado! Revisa tu Tonkeeper.";
            puntos = 0; // Reiniciar puntos
            document.getElementById('balance').innerText = puntos;
        } catch (e) {
            console.error(e);
            status.innerText = "❌ Error o cancelación del usuario.";
        }
    }
</script>

</body>
</html>
