<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Diamond TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --ton: #0098ea; }
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: #111; border-bottom: 2px solid #333; }
        #score { font-size: 32px; font-weight: 800; color: var(--ton); }
        .btn-w { background: #222; color: #555; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; pointer-events: none; transition: 0.3s; }
        .ready { background: var(--ton) !important; color: white !important; pointer-events: auto !important; box-shadow: 0 0 20px var(--ton); animation: p 1.5s infinite; }
        @keyframes p { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .game { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .diamond { font-size: 150px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 20px var(--ton)); user-select: none; }
        .diamond:active { transform: scale(0.85); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .m-content { background: #1c1c1e; width: 85%; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #444; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; text-align: center; }
        .btn-c { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--ton); color: white; font-weight: bold; }
    </style>
</head>
<body>
    <header class="header">
        <div style="display:flex; flex-direction:column;">
            <span id="score">0</span>
            <span id="ton-val" style="color:gray; font-size:12px;">0.000 TON</span>
        </div>
        <button id="btn-w" class="btn-w" onclick="openM()">RETIRAR</button>
    </header>
    <main class="game"><div class="diamond" onclick="tap()">♦️</div></main>
    <div id="modal" class="modal">
        <div class="m-content">
            <h2 style="color:var(--ton)">Retirar a Wallet</h2>
            <input type="text" id="wallet" placeholder="Dirección UQBpc...">
            <button class="btn-c" onclick="send()">CONFIRMAR</button>
            <p onclick="closeM()" style="color:#666; margin-top:15px; cursor:pointer">Cerrar</p>
        </div>
    </div>
<script>
    let p = 0;
    const btn = document.getElementById('btn-w');
    function tap() {
        p += 10;
        document.getElementById('score').innerText = p;
        document.getElementById('ton-val').innerText = (p * 0.001).toFixed(3) + " TON";
        if (p >= 50) btn.classList.add('ready');
        if(window.Telegram) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
    }
    function openM() { document.getElementById('modal').style.display = 'flex'; }
    function closeM() { document.getElementById('modal').style.display = 'none'; }
    async function send() {
        const addr = document.getElementById('wallet').value;
        try {
            const res = await fetch('/api/payout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ address: addr, points: p })
            });
            const data = await res.json();
            if (data.ok) { alert("¡Pago enviado!"); location.reload(); }
            else { alert("Error: " + data.error); }
        } catch (e) { alert("Error 500: Revisa el package.json y tus 24 palabras."); }
    }
</script>
</body>
</html>
