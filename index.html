<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Retiro - Test Mode</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #151515; padding: 30px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid #222; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { color: #f39c12; margin-bottom: 5px; }
        .balance-info { font-size: 12px; color: #666; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #f39c12; color: #000; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e67e22; transform: scale(1.02); }
        #log { margin-top: 20px; font-size: 13px; min-height: 40px; }
        .err { color: #e74c3c; }
        .ok { color: #2ecc71; }
    </style>
</head>
<body>

<div class="card">
    <h2>Retiro de Puntos</h2>
    <div class="balance-info">Modo Prueba Activo</div>
    
    <input type="number" id="puntos" placeholder="Cantidad de puntos">
    <input type="text" id="destino" placeholder="Dirección UQBpc...">
    
    <button onclick="testRetiro()">ENVIAR AHORA</button>
    
    <div id="log"></div>
</div>

<script>
    // Tu Key de prueba configurada
    const TEST_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";
    
    async function testRetiro() {
        const puntos = document.getElementById('puntos').value;
        const wallet = document.getElementById('destino').value;
        const log = document.getElementById('log');

        if (!puntos || !wallet) {
            log.innerHTML = "<span class='err'>⚠️ Rellena los datos</span>";
            return;
        }

        log.innerHTML = "⏳ Conectando con la API...";

        try {
            // Ejemplo de llamada POST enviando tu Key
            const response = await fetch('https://api.tu-servicio-crypto.com/v1/payout', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${TEST_KEY}` // Aquí viaja tu Key
                },
                body: JSON.stringify({
                    address: wallet,
                    amount: puntos,
                    currency: "TON" // O la moneda que uses
                })
            });

            // Como es una prueba, si la URL no existe dará error de red
            // Pero aquí verás si la lógica de envío es correcta
            if (response.ok) {
                const data = await response.json();
                log.innerHTML = "<span class='ok'>✅ Transacción procesada con éxito</span>";
            } else {
                log.innerHTML = `<span class='err'>❌ Error del servidor: ${response.status}</span>`;
            }

        } catch (error) {
            // Si la URL es de ejemplo, entrará aquí (Error de red)
            log.innerHTML = "<span class='err'>❌ Error: URL de API no configurada o rechazo de CORS</span>";
            console.log("Datos que se intentaron enviar:", { key: TEST_KEY, wallet, puntos });
        }
    }
</script>

</body>
</html>
