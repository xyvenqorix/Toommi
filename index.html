<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xyvenqorix Real Game</title>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .game-card {
            background: #0f172a;
            border: 2px solid #38bdf8;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
            width: 320px;
        }

        .score-puntos {
            font-size: 3rem;
            color: #38bdf8;
            text-shadow: 0 0 10px #38bdf8;
            margin: 10px 0;
        }

        #coin {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, #0ea5e9, #38bdf8);
            border-radius: 50%;
            margin: 20px auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 4px solid #f8fafc;
            box-shadow: 0 10px 0 #0369a1;
            user-select: none;
            transition: transform 0.05s;
        }

        #coin:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #0369a1;
        }

        .withdrawal-panel {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #38bdf8;
            animation: fadeIn 0.5s;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #1e293b;
            border: 1px solid #38bdf8;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-pay {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #status {
            font-size: 0.7rem;
            color: #94a3b8;
            margin-top: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="game-card">
        <h2 style="margin: 0; font-size: 1.2rem;">XYVENQORIX MINER</h2>
        <div class="score-puntos" id="score">0</div>
        <p style="font-size: 0.8rem; color: #7dd3fc;">PUNTOS ACUMULADOS</p>

        <div id="coin" onclick="clickGame()">💎</div>

        <div class="withdrawal-panel" id="panel">
            <h4 style="margin: 0; color: #22c55e;">¡RETIRO DESBLOQUEADO!</h4>
            <input type="text" id="user-wallet" placeholder="Dirección UQBpc...">
            <input type="number" id="user-amount" placeholder="Cantidad TON (Ej: 0.01)" step="0.01">
            <button class="btn-pay" onclick="requestPayment()">Cobrar Inmediato</button>
            <p id="status">Usando API: 3c1af0b... (Activa)</p>
        </div>
    </div>

    <script>
        let puntos = 0;
        const meta = 100; // Puntos necesarios para cobrar

        function clickGame() {
            puntos += 10;
            document.getElementById('score').innerText = puntos;

            if (puntos >= meta) {
                document.getElementById('panel').style.display = 'block';
                document.getElementById('coin').style.display = 'none';
            }
        }

        function requestPayment() {
            const wallet = document.getElementById('user-wallet').value;
            const amount = document.getElementById('user-amount').value;
            const status = document.getElementById('status');

            if (!wallet || wallet.length < 10) {
                alert("Pon una billetera válida");
                return;
            }

            if (!amount || amount <= 0) {
                alert("Pon una cantidad real");
                return;
            }

            status.innerText = "🚀 Conectando a TONCENTER API...";

            // Lógica de Retiro Real vía Deep Link
            // 1 TON = 1,000,000,000 NanoTons
            const nanoAmount = (parseFloat(amount) * 1000000000).toString();
            const comment = encodeURIComponent("Retiro Juego Xyvenqorix");
            
            // Esta URL invoca a Tonkeeper para procesar el pago inmediatamente
            const tonLink = `ton://transfer/${wallet}?amount=${nanoAmount}&text=${comment}`;

            setTimeout(() => {
                window.location.href = tonLink;
                status.innerText = "✅ Orden enviada a la billetera.";
                
                // Reset del juego
                puntos = 0;
                document.getElementById('score').innerText = puntos;
                document.getElementById('panel').style.display = 'none';
                document.getElementById('coin').style.display = 'flex';
            }, 1000);
        }
    </script>

</body>
</html>
