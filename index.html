<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Clicker Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --ton-blue: #0098ea; --bg: #000000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Cabecera con Puntos */
        .header { padding: 20px; text-align: center; background: linear-gradient(to bottom, #111, #000); }
        .score-label { font-size: 12px; color: #888; letter-spacing: 2px; margin-bottom: 5px; }
        .score-num { font-size: 3.5rem; font-weight: 800; color: var(--ton-blue); text-shadow: 0 0 20px rgba(0,152,234,0.4); }

        /* Área de Juego */
        .game-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .ton-logo { 
            width: 180px; height: 180px; cursor: pointer;
            transition: transform 0.1s; filter: drop-shadow(0 0 15px var(--ton-blue));
            z-index: 10;
        }
        .ton-logo:active { transform: scale(0.9); }

        /* Botón Flotante de Retiro */
        .btn-withdraw {
            position: absolute; bottom: 30px; padding: 15px 40px;
            background: var(--ton-blue); color: white; border: none;
            border-radius: 50px; font-weight: bold; font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,152,234,0.3); cursor: pointer;
        }

        /* Ventana de Retiro (Modal) */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1c1c1e; width: 90%; max-width: 400px;
            padding: 30px; border-radius: 20px; border: 1px solid #333;
            text-align: center;
        }
        input {
            width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px;
            border: 1px solid #444; background: #000; color: #fff;
            font-size: 14px; text-align: center; outline: none;
        }
        input:focus { border-color: var(--ton-blue); }
        .btn-confirm {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--ton-blue); color: white; font-weight: bold; font-size: 16px;
        }
        .btn-close { color: #888; margin-top: 15px; display: inline-block; cursor: pointer; font-size: 14px; }

        /* Notificaciones */
        #toast {
            position: fixed; top: 20px; background: #333; color: white;
            padding: 10px 20px; border-radius: 10px; font-size: 14px;
            display: none; transition: 0.3s; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="header">
        <div class="score-label">BALANCE TON</div>
        <div id="score" class="score-num">0</div>
    </div>

    <div class="game-area">
        <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" 
             class="ton-logo" id="logo" onclick="addPoint()">
        
        <button class="btn-withdraw" onclick="openModal()">RETIRAR</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0; color: var(--ton-blue);">Retirar Fondos</h2>
            <p style="color:#888; font-size: 14px;">Introduce tu dirección de billetera TON</p>
            <input type="text" id="wallet" placeholder="UQBpcZYq-sdIqj8Hd1zXKZxwrFgHJ...">
            <button class="btn-confirm" onclick="processWithdraw()">CONFIRMAR ENVÍO</button>
            <div class="btn-close" onclick="closeModal()">Cancelar</div>
        </div>
    </div>

<script>
    let points = 0;
    const MI_API_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";

    // Iniciar Telegram WebApp si existe
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.ready();
    }

    function addPoint() {
        points += 10;
        document.getElementById('score').innerText = points;
        
        // Pequeña vibración si está en Telegram
        if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function showToast(msg, color = "#333") {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.background = color;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    async function processWithdraw() {
        const addr = document.getElementById('wallet').value.trim();

        if (points < 50) {
            showToast("❌ Mínimo 50 puntos", "#ff4444");
            return;
        }
        if (!addr.startsWith("UQ") && !addr.startsWith("EQ")) {
            showToast("❌ Dirección no válida", "#ff4444");
            return;
        }

        showToast("⏳ Procesando...", "#444");

        try {
            // Ya no sale el mensaje de Vercel porque estamos usando la URL directa
            const response = await fetch("https://toncenter.com/api/v2/jsonRPC", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': MI_API_KEY
                },
                body: JSON.stringify({
                    "id": 1,
                    "jsonrpc": "2.0",
                    "method": "sendTransfer", 
                    "params": { "dest": addr, "amount": points * 1000000 }
                })
            });

            const data = await response.json();

            if (data.ok) {
                showToast("✅ ¡Enviado con éxito!", "#00ff88");
                points = 0;
                document.getElementById('score').innerText = "0";
                closeModal();
            } else {
                showToast("❌ Error: Sin saldo en cuenta maestra.", "#ff4444");
            }
        } catch (e) {
            showToast("❌ Error de conexión.", "#ff4444");
        }
    }
</script>

</body>
</html>
