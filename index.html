<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xyvenqorix Pay</title>
    <style>
        body { background: #0b0f1a; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161b2c; padding: 30px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #1e293b; }
        h2 { color: #0088cc; margin-bottom: 10px; }
        .balance-box { font-size: 2.5rem; font-weight: bold; margin-bottom: 20px; color: #f8fafc; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn-withdraw { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
        .btn-withdraw:hover { background: #0077b5; }
        #log { font-size: 0.8rem; margin-top: 15px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <h2>Xyvenqorix Game</h2>
    <div class="balance-box" id="disp-puntos">500</div>
    <p style="margin-top:-15px; font-size: 0.9rem; color: #64748b;">Tus puntos acumulados</p>

    <div style="text-align: left; margin-top: 20px;">
        <label>Dirección de Billetera TON:</label>
        <input type="text" id="wallet-addr" placeholder="UQBpcZYq...">
        
        <label>Cantidad a retirar (TON):</label>
        <input type="number" id="withdraw-amount" placeholder="Ej: 0.1" step="0.01">
    </div>

    <button class="btn-withdraw" onclick="procesarRetiro()">RETIRAR AHORA</button>
    <div id="log">Introduce tus datos para el retiro inmediato.</div>
</div>

<script>
    // Tu API KEY que proporcionaste
    const API_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";

    function procesarRetiro() {
        const wallet = document.getElementById('wallet-addr').value.trim();
        const amount = document.getElementById('withdraw-amount').value;
        const log = document.getElementById('log');

        if (!wallet || wallet.length < 10) {
            alert("⚠️ Por favor, ingresa una dirección de billetera válida.");
            return;
        }

        if (!amount || amount <= 0) {
            alert("⚠️ Ingresa una cantidad mayor a 0.");
            return;
        }

        log.innerText = "⏳ Generando enlace de pago...";

        // CONSTRUCCIÓN DEL ENLACE DE TONKEEPER (Deep Link)
        // Esto genera una URL que abre Tonkeeper directamente con la transacción lista.
        // Formato: ton://transfer/DIRECCION?amount=NANOTONS&text=COMENTARIO
        
        const nanoAmount = (parseFloat(amount) * 1000000000).toString(); // Convertir a nanoTON
        const comment = encodeURIComponent("Retiro Xyvenqorix Game");
        
        const tonLink = `ton://transfer/${wallet}?amount=${nanoAmount}&text=${comment}`;

        // Intentar abrir Tonkeeper
        log.innerText = "🚀 Abriendo Tonkeeper...";
        window.location.href = tonLink;

        // Si después de 3 segundos no pasa nada, avisar
        setTimeout(() => {
            log.innerHTML = "✅ Si no se abrió Tonkeeper, asegúrate de tener la app instalada.<br>URL: <a href='"+tonLink+"' style='color:#0088cc'>Abrir manualmente</a>";
        }, 3000);
    }
</script>

</body>
</html>
