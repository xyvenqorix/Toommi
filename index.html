<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON Diamond Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --ton-blue: #0098ea; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #111; border-bottom: 1px solid #333; }
        .score-num { font-size: 28px; font-weight: 800; color: var(--ton-blue); }
        .btn-withdraw { background: var(--ton-blue); color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* JUEGO */
        .game-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        .diamond { font-size: 150px; cursor: pointer; transition: transform 0.1s; user-select: none; filter: drop-shadow(0 0 20px var(--ton-blue)); }
        .diamond:active { transform: scale(0.8); }

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1c1c1e; width: 85%; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #444; }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: #fff; text-align: center; }
        .btn-send { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--ton-blue); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <div style="font-size: 10px; color: #888;">MIS PUNTOS</div>
            <div id="score" class="score-num">0</div>
        </div>
        <button class="btn-withdraw" onclick="openModal()">RETIRAR</button>
    </header>

    <main class="game-container">
        <div class="diamond" onclick="tap()">♦️</div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>Retirar TON</h3>
            <input type="text" id="wallet" placeholder="Tu dirección UQBpc...">
            <button class="btn-send" onclick="sendToVercel()">CONFIRMAR ENVÍO</button>
            <p onclick="closeModal()" style="color: #666; margin-top: 15px; cursor: pointer;">Cerrar</p>
        </div>
    </div>

<script>
    let points = 0;
    if (window.Telegram) window.Telegram.WebApp.expand();

    function tap() {
        points += 10;
        document.getElementById('score').innerText = points;
        if (window.Telegram && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
    }

    function openModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    async function sendToVercel() {
        const addr = document.getElementById('wallet').value;
        if (points < 50) return alert("Mínimo 50 puntos");

        // LLAMADA AL SERVIDOR DE VERCEL (Paso 2)
        try {
            const res = await fetch('/api/payout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ address: addr, points: points })
            });
            const data = await res.json();
            if (data.ok) {
                alert("✅ ¡Pago enviado!");
                points = 0;
                document.getElementById('score').innerText = "0";
                closeModal();
            } else {
                alert("❌ Error: " + data.error);
            }
        } catch (e) {
            alert("❌ Error de comunicación con el servidor.");
        }
    }
</script>
</body>
</html>
