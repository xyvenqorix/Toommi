<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pajarito Game & Retiro</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #0a0a0a; color: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* Interfaz de Puntos */
        #header { width: 100%; padding: 20px; text-align: center; background: #111; border-bottom: 2px solid #00d4ff; z-index: 10; }
        #puntos-display { font-size: 2rem; color: #00d4ff; font-weight: bold; }

        /* El Juego */
        #game-area { width: 100vw; height: 60vh; position: relative; cursor: pointer; }
        #pajarito { width: 80px; height: 80px; background: #ff9800; border-radius: 50%; position: absolute; display: flex; justify-content: center; align-items: center; font-size: 40px; user-select: none; transition: 0.1s; box-shadow: 0 0 20px #ff9800; }
        #pajarito:active { transform: scale(0.9); }

        /* Panel de Retiro */
        #panel-retiro { background: #1a1a1a; padding: 20px; width: 90%; max-width: 400px; border-radius: 15px; margin-top: -50px; z-index: 20; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; background: #00d4ff; color: #000; font-weight: bold; cursor: pointer; }
        #status { font-size: 12px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

<div id="header">
    <div>PUNTOS GANADOS</div>
    <div id="puntos-display">0</div>
</div>

<div id="game-area" onclick="moverPajarito()">
    <div id="pajarito">🐦</div>
</div>

<div id="panel-retiro">
    <h3>Retirar a Wallet</h3>
    <input type="text" id="wallet" placeholder="Dirección UQBpc...">
    <button onclick="solicitarRetiro()">RETIRAR TODO</button>
    <div id="status">Presiona el pájaro para ganar puntos antes de retirar.</div>
</div>

<script>
    let puntos = 0;
    const display = document.getElementById('puntos-display');
    const pajarito = document.getElementById('pajarito');
    const status = document.getElementById('status');

    // 1. LÓGICA DEL JUEGO (Mover y ganar)
    function moverPajarito() {
        puntos += 10; // Ganas 10 puntos por click
        display.innerText = puntos;

        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight * 0.5);
        
        pajarito.style.left = x + "px";
        pajarito.style.top = y + "px";
        
        status.innerText = "¡Sigue así! Necesitas puntos para retirar.";
    }

    // Mover al inicio
    moverPajarito();

    // 2. LÓGICA DE RETIRO (Usa tu API KEY)
    async function solicitarRetiro() {
        const wallet = document.getElementById('wallet').value;
        const API_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";

        if (puntos < 50) {
            status.innerText = "❌ Necesitas al menos 50 puntos.";
            return;
        }
        if (!wallet.startsWith("UQ") && !wallet.startsWith("EQ")) {
            status.innerText = "❌ Dirección de wallet no válida.";
            return;
        }

        status.innerText = "⏳ Conectando con Toncenter...";

        try {
            // Intentamos la petición a Toncenter
            const response = await fetch("https://toncenter.com/api/v2/jsonRPC", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': API_KEY
                },
                body: JSON.stringify({
                    "id": 1,
                    "jsonrpc": "2.0",
                    "method": "sendTransfer", 
                    "params": {
                        "dest": wallet,
                        "amount": puntos * 1000000, // Ajuste de puntos a Nanotons
                        "message": "Retiro Pajarito Web"
                    }
                })
            });

            const data = await response.json();

            if (data.ok) {
                status.style.color = "#00ff88";
                status.innerText = "✅ ¡Retiro Exitoso! Puntos enviados.";
                puntos = 0;
                display.innerText = "0";
            } else {
                // Si sale error aquí, es porque Toncenter exige firma (BOC) o tu cuenta no tiene saldo
                status.style.color = "#ff4444";
                status.innerText = "❌ Error de Red: Toncenter requiere firma manual o fondos insuficientes.";
                console.log("Respuesta API:", data);
            }
        } catch (e) {
            status.innerText = "❌ Error: No se pudo conectar. Asegúrate de estar en HTTPS.";
        }
    }
</script>

</body>
</html>
