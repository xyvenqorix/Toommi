<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>TON Clicker Game</title>
    <style>
        :root { --ton-blue: #0098ea; }
        body { 
            margin: 0; background: #000; color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        
        /* Marcador de Puntos */
        #ui-top { margin-top: 40px; text-align: center; pointer-events: none; }
        #score { font-size: 5rem; font-weight: 900; color: var(--ton-blue); text-shadow: 0 0 20px rgba(0,152,234,0.5); }
        #label { font-size: 12px; letter-spacing: 3px; color: #888; }

        /* Área de Juego */
        #game-canvas { 
            flex-grow: 1; width: 100%; position: relative; 
            background: radial-gradient(circle, #111 0%, #000 70%);
        }

        /* El Logo de TON (Objetivo) */
        #ton-target { 
            width: 120px; height: 120px; 
            position: absolute; cursor: pointer;
            transition: transform 0.05s;
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        #ton-target img { width: 100%; height: 100%; pointer-events: none; }
        #ton-target:active { transform: scale(0.8); }

        /* Panel de Retiro */
        #payout-panel { 
            width: 100%; max-width: 450px; background: #111; padding: 25px; 
            border-radius: 25px 25px 0 0; border-top: 2px solid #333; 
            box-sizing: border-box; z-index: 200;
        }
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #444; background: #000; color: #fff; text-align: center; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            background: var(--ton-blue); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; 
        }
        #status-msg { font-size: 12px; margin-top: 10px; text-align: center; color: #666; min-height: 15px; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div id="label">PUNTOS ACUMULADOS</div>
        <div id="score">0</div>
    </div>

    <div id="game-canvas">
        <div id="ton-target" onclick="processClick(event)">
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.png" alt="TON">
        </div>
    </div>

    <div id="payout-panel">
        <input type="text" id="address" placeholder="Dirección TON (UQBpc...)">
        <button onclick="sendWithdrawal()">RETIRAR AHORA</button>
        <div id="status-msg">¡Toca el logo azul para ganar puntos!</div>
    </div>

<script>
    let puntos = 0;
    const scoreDisplay = document.getElementById('score');
    const target = document.getElementById('ton-target');
    const status = document.getElementById('status-msg');

    // CONFIGURACIÓN (Tu Key de la captura)
    const MI_API_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";

    // Función para mover el logo a un lugar al azar
    function moverLogo() {
        const canvas = document.getElementById('game-canvas');
        const maxX = canvas.clientWidth - 120;
        const maxY = canvas.clientHeight - 120;
        
        const randomX = Math.floor(Math.random() * maxX);
        const randomY = Math.floor(Math.random() * maxY);
        
        target.style.left = randomX + "px";
        target.style.top = randomY + "px";
    }

    // Al tocar el logo
    function processClick(event) {
        event.stopPropagation(); // Evita errores de click doble
        puntos += 10;
        scoreDisplay.innerText = puntos;
        
        status.innerText = "¡Puntos sumados! +10";
        status.style.color = "#00ff88";
        
        moverLogo(); // Se mueve al tocarlo
    }

    // Iniciar posición
    moverLogo();

    // Función de Retiro
    async function sendWithdrawal() {
        const wallet = document.getElementById('address').value.trim();

        if (puntos < 20) {
            status.innerText = "❌ Necesitas al menos 20 puntos.";
            status.style.color = "#ff4444";
            return;
        }
        if (!wallet.startsWith("UQ") && !wallet.startsWith("EQ")) {
            status.innerText = "❌ Wallet inválida.";
            return;
        }

        status.innerText = "⏳ Conectando con Toncenter...";
        status.style.color = "#888";

        try {
            const response = await fetch("https://toncenter.com/api/v2/jsonRPC", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': MI_API_KEY
                },
                body: JSON.stringify({
                    "id": 1,
                    "jsonrpc": "2.0",
                    "method": "sendTransfer", 
                    "params": {
                        "dest": wallet,
                        "amount": puntos * 1000000 // Nanotons
                    }
                })
            });

            const data = await response.json();

            if (data.ok) {
                status.innerText = "✅ RETIRO EXITOSO. Revisa tu App.";
                status.style.color = "#00ff88";
                puntos = 0;
                scoreDisplay.innerText = "0";
            } else {
                // Error típico si la Key no tiene saldo o permiso
                status.innerText = "❌ Error de Red: Revisa saldo en cuenta maestra.";
                status.style.color = "#ff4444";
                console.log(data);
            }
        } catch (e) {
            status.innerText = "❌ Error: Sube el código a Vercel.";
        }
    }
</script>

</body>
</html>
