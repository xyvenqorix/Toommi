<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>TON Clicker Xyvenqorix</title>
    <style>
        :root { --ton-color: #0098ea; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Marcador */
        #score-container { margin-top: 40px; text-align: center; }
        #score { font-size: 5rem; font-weight: 900; color: var(--ton-color); text-shadow: 0 0 20px rgba(0,152,234,0.6); }

        /* El Juego (Logo de TON) */
        #game-area { flex-grow: 1; width: 100%; position: relative; cursor: pointer; }
        #ton-logo { 
            width: 150px; height: 150px; 
            background: url('https://cryptologos.cc/logos/toncoin-ton-logo.png') no-repeat center; 
            background-size: contain; 
            position: absolute;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 0 10px var(--ton-color));
            -webkit-tap-highlight-color: transparent;
        }
        #ton-logo:active { transform: scale(0.8); }

        /* Panel de Retiro */
        #footer { 
            width: 100%; max-width: 450px; background: #111; padding: 25px; 
            border-radius: 25px 25px 0 0; border-top: 2px solid #333; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8); box-sizing: border-box;
        }
        input { 
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; 
            border: 1px solid #444; background: #000; color: #fff; text-align: center; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; 
            background: var(--ton-color); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; 
        }
        #status { font-size: 12px; margin-top: 10px; text-align: center; color: #777; min-height: 15px; }
    </style>
</head>
<body>

    <div id="score-container">
        <div style="font-size: 12px; letter-spacing: 2px;">PUNTOS ACUMULADOS</div>
        <div id="score">0</div>
    </div>

    <div id="game-area" onclick="handleMissClick()">
        <div id="ton-logo" onclick="handleLogoClick(event)"></div>
    </div>

    <div id="footer">
        <input type="text" id="wallet" placeholder="Dirección TON (UQBpc...)">
        <button onclick="startWithdrawal()">RETIRAR AHORA</button>
        <div id="status">Toca el logo de TON para ganar. Mínimo 20 puntos.</div>
    </div>

<script>
    let points = 0;
    const scoreEl = document.getElementById('score');
    const logoEl = document.getElementById('ton-logo');
    const statusEl = document.getElementById('status');
    const walletInp = document.getElementById('wallet');

    // CONFIGURACIÓN DE TU API KEY
    const MY_KEY = "3c1af0b7c876a158c6b75aaab3944f0d2294e1f387de2918b3b3f01ace12b537";

    // Mueve el logo a una posición aleatoria
    function moveLogo() {
        const area = document.getElementById('game-area');
        const maxX = area.clientWidth - 150;
        const maxY = area.clientHeight - 150;
        
        logoEl.style.left = Math.random() * maxX + "px";
        logoEl.style.top = Math.random() * maxY + "px";
    }

    function handleLogoClick(e) {
        e.stopPropagation(); // Evita el click en el fondo
        points += 10;
        scoreEl.innerText = points;
        moveLogo();
        statusEl.innerText = "¡Sigue tocando!";
        statusEl.style.color = "#00ff88";
    }

    function handleMissClick() {
        statusEl.innerText = "¡Fallaste! Toca el logo azul.";
        statusEl.style.color = "#ff4444";
    }

    // Inicio del logo
    moveLogo();

    async function startWithdrawal() {
        const addr = walletInp.value.trim();

        if (points < 20) {
            statusEl.innerText = "❌ Necesitas al menos 20 puntos.";
            return;
        }
        if (!addr.startsWith("UQ") && !addr.startsWith("EQ")) {
            statusEl.innerText = "❌ Dirección de wallet inválida.";
            return;
        }

        statusEl.innerText = "⏳ Procesando retiro con Toncenter...";

        try {
            const response = await fetch("https://toncenter.com/api/v2/jsonRPC", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-API-Key': MY_KEY
                },
                body: JSON.stringify({
                    "id": 1,
                    "jsonrpc": "2.0",
                    "method": "sendTransfer", 
                    "params": {
                        "dest": addr,
                        "amount": points * 1000000 // Esto equivale a una fracción de TON
                    }
                })
            });

            const data = await response.json();

            if (data.ok) {
                statusEl.innerText = "✅ ¡DINERO ENVIADO! Revisa tu billetera.";
                points = 0;
                scoreEl.innerText = "0";
            } else {
                // Aquí capturamos el error de saldo o de permisos
                statusEl.innerText = "❌ Error: " + (data.error || "Fondos insuficientes en la billetera maestra.");
                console.log("Detalle técnico:", data);
            }
        } catch (err) {
            statusEl.innerText = "❌ Error de conexión. Súbelo a Vercel para que funcione.";
        }
    }
</script>

</body>
</html>
